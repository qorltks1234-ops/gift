<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="황성은 귀하 — 생일 증정권">
<meta property="og:description" content="배기산으로부터 진심을 담아 봉정하는 현금 증정권입니다.">
<meta property="og:type" content="website">

<title>황성은 귀하 · Gift Voucher</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

  body {
    background: #181818;
    min-height: 100vh;
    padding: 30px 16px 60px;
    font-family: 'Noto Serif KR', serif;
  }

  .stage {
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
  }

  .coupon {
    width: 100%;
    background: #0e0e0e;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid #3a3020;
  }

  .coupon-top { padding: 2rem 2rem 1.2rem; position: relative; text-align: center; }
  .brand-line { font-family: 'Playfair Display', serif; font-size: 10px; letter-spacing: 4px; color: #b8963e; margin-bottom: 1.4rem; text-transform: uppercase; }
  .recipient-label { font-size: 11px; color: #7a6a50; letter-spacing: 2px; margin-bottom: 0.4rem; }
  .recipient-name { font-family: 'Playfair Display', serif; font-size: 28px; font-style: italic; color: #e8d5a3; margin-bottom: 0.2rem; line-height: 1.2; }
  .recipient-suffix { font-size: 13px; color: #b8963e; letter-spacing: 1px; margin-bottom: 1.6rem; }
  .ornament { color: #b8963e; font-size: 18px; letter-spacing: 8px; margin-bottom: 1.4rem; opacity: 0.7; }
  .amount-label { font-size: 10px; color: #7a6a50; letter-spacing: 3px; margin-bottom: 0.5rem; }
  .amount { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 600; color: #e8d5a3; line-height: 1; margin-bottom: 0.2rem; }
  .amount-krw { font-size: 11px; color: #7a6a50; letter-spacing: 2px; margin-bottom: 0.4rem; }
  .amount-unit { font-size: 14px; color: #b8963e; letter-spacing: 2px; margin-bottom: 1.6rem; }
  .divider-area { display: flex; align-items: center; margin: 0 -1px; height: 24px; }
  .divider-line { flex: 1; height: 1px; background: #3a3020; }
  .notch { width: 24px; height: 24px; border-radius: 50%; background: #181818; border: 1px solid #3a3020; flex-shrink: 0; }
  .coupon-bottom { padding: 1.2rem 2rem 1.8rem; text-align: center; }
  .desc { font-size: 11.5px; color: #7a6a50; line-height: 1.9; margin-bottom: 1.4rem; letter-spacing: 0.5px; }
  .desc em { color: #b8963e; font-style: normal; }
  .from-section { border-top: 1px solid #2a2218; padding-top: 1rem; }
  .from-label { font-size: 10px; color: #5a4e38; letter-spacing: 2px; margin-bottom: 0.3rem; }
  .from-name { font-family: 'Playfair Display', serif; font-size: 16px; font-style: italic; color: #9a8060; }
  .barcode-area { margin-top: 1rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .barcode { display: flex; gap: 2px; align-items: flex-end; height: 28px; }
  .barcode span { background: #3a3020; border-radius: 1px; display: inline-block; width: 2px; }
  .barcode-num { font-family: 'Playfair Display', serif; font-size: 9px; color: #4a4030; letter-spacing: 3px; }
  .corner-deco { position: absolute; width: 16px; height: 16px; opacity: 0.4; }
  .corner-deco.tl { top: 14px; left: 14px; border-top: 1px solid #b8963e; border-left: 1px solid #b8963e; }
  .corner-deco.tr { top: 14px; right: 14px; border-top: 1px solid #b8963e; border-right: 1px solid #b8963e; }

  .scroll-hint { text-align: center; margin: 2.4rem 0 0.5rem; color: #5a4e38; font-size: 11px; letter-spacing: 2px; animation: bob 2s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0); opacity:0.6;} 50% { transform: translateY(5px); opacity:1;} }

  .gallery-header { text-align: center; margin: 3.5rem 0 0.4rem; }
  .gallery-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; color: #e8d5a3; margin-bottom: 0.5rem; }
  .gallery-sub { font-size: 11px; color: #7a6a50; letter-spacing: 1.5px; line-height: 1.8; }
  .gallery-rule { width: 40px; height: 1px; background: #b8963e; margin: 1.2rem auto 2.2rem; opacity: 0.5; }

  .gallery { display: flex; flex-direction: column; gap: 1.4rem; }
  .photo-item {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.9s ease, transform 0.9s ease;
    transition-delay: var(--delay);
  }
  .photo-item.visible { opacity: 1; transform: translateY(0); }
  .photo-item img {
    width: 100%;
    border-radius: 14px;
    display: block;
    border: 1px solid #2a2218;
  }
  .photo-item figcaption {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 12px;
    color: #9a8060;
    margin-top: 0.7rem;
    letter-spacing: 1px;
  }

  .closing { text-align: center; margin: 3rem 0 1rem; }
  .closing-line { font-size: 12px; color: #7a6a50; line-height: 2; letter-spacing: 1px; }
  .closing-line em { color: #b8963e; font-style: normal; }
  .closing-heart { color: #b8963e; font-size: 16px; margin-top: 1rem; opacity: 0.7; }
</style>

<script>
  const bc = document.getElementById('bc');
  const heights = [20,14,20,10,18,12,20,8,16,20,10,18,14,20,8,16,12,20,10,18,20,14,8,20,16,12,18,20,10,16];
  heights.forEach(h => {
    const s = document.createElement('span');
    s.style.height = h + 'px';
    bc.appendChild(s);
  });

  const items = document.querySelectorAll('.photo-item');
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });
  items.forEach(i => obs.observe(i));
</script>
