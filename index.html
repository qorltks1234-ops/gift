<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 카카오톡 링크 미리보기 -->
<meta property="og:title" content="황성은 귀하 — 생일 증정권">
<meta property="og:description" content="배기산으로부터 진심을 담아 봉정하는 현금 증정권입니다.">
<meta property="og:type" content="website">

<title>황성은 귀하 · Gift Voucher</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #181818;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px 16px;
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

  .coupon {
    width: 100%;
    max-width: 360px;
    background: #0e0e0e;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid #3a3020;
  }

  .coupon-top {
    padding: 2rem 2rem 1.2rem;
    position: relative;
    text-align: center;
  }

  .brand-line {
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #b8963e;
    margin-bottom: 1.4rem;
    text-transform: uppercase;
  }

  .recipient-label {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: #7a6a50;
    letter-spacing: 2px;
    margin-bottom: 0.4rem;
  }

  .recipient-name {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 400;
    font-style: italic;
    color: #e8d5a3;
    margin-bottom: 0.2rem;
    line-height: 1.2;
  }

  .recipient-suffix {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: #b8963e;
    letter-spacing: 1px;
    margin-bottom: 1.6rem;
  }

  .ornament {
    color: #b8963e;
    font-size: 18px;
    letter-spacing: 8px;
    margin-bottom: 1.4rem;
    opacity: 0.7;
  }

  .amount-label {
    font-family: 'Noto Serif KR', serif;
    font-size: 10px;
    color: #7a6a50;
    letter-spacing: 3px;
    margin-bottom: 0.5rem;
  }

  .amount {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 600;
    color: #e8d5a3;
    line-height: 1;
    margin-bottom: 0.2rem;
  }

  .amount-krw {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: #7a6a50;
    letter-spacing: 2px;
    margin-bottom: 0.4rem;
  }

  .amount-unit {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    color: #b8963e;
    letter-spacing: 2px;
    margin-bottom: 1.6rem;
  }

  .divider-area {
    display: flex;
    align-items: center;
    margin: 0 -1px;
    height: 24px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: #3a3020;
  }

  .notch {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #181818;
    border: 1px solid #3a3020;
    flex-shrink: 0;
  }

  .coupon-bottom {
    padding: 1.2rem 2rem 1.8rem;
    text-align: center;
  }

  .desc {
    font-family: 'Noto Serif KR', serif;
    font-size: 11.5px;
    color: #7a6a50;
    line-height: 1.9;
    margin-bottom: 1.4rem;
    letter-spacing: 0.5px;
  }

  .desc em {
    color: #b8963e;
    font-style: normal;
  }

  .from-section {
    border-top: 1px solid #2a2218;
    padding-top: 1rem;
  }

  .from-label {
    font-family: 'Noto Serif KR', serif;
    font-size: 10px;
    color: #5a4e38;
    letter-spacing: 2px;
    margin-bottom: 0.3rem;
  }

  .from-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-style: italic;
    color: #9a8060;
  }

  .barcode-area {
    margin-top: 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .barcode {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 28px;
  }

  .barcode span {
    background: #3a3020;
    border-radius: 1px;
    display: inline-block;
    width: 2px;
  }

  .barcode-num {
    font-family: 'Playfair Display', serif;
    font-size: 9px;
    color: #4a4030;
    letter-spacing: 3px;
  }

  .corner-deco {
    position: absolute;
    width: 16px;
    height: 16px;
    opacity: 0.4;
  }
  .corner-deco.tl { top: 14px; left: 14px; border-top: 1px solid #b8963e; border-left: 1px solid #b8963e; }
  .corner-deco.tr { top: 14px; right: 14px; border-top: 1px solid #b8963e; border-right: 1px solid #b8963e; }
</style>
</head>
<body>
<div class="coupon">
  <div class="coupon-top">
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="brand-line">Gift Voucher · 증정권</div>
    <div class="recipient-label">수 신</div>
    <div class="recipient-name">Hwang Sungeun</div>
    <div class="recipient-suffix">황성은 귀하</div>
    <div class="ornament">— ✦ —</div>
    <div class="amount-label">액 면 금 액</div>
    <div class="amount">400,000</div>
    <div class="amount-krw">( 금사십만원정 )</div>
    <div class="amount-unit">대한민국 원정 ( ₩ )</div>
  </div>

  <div class="divider-area">
    <div class="notch" style="margin-left:-12px;"></div>
    <div class="divider-line"></div>
    <div class="notch" style="margin-right:-12px;"></div>
  </div>

  <div class="coupon-bottom">
    <div class="desc">
      본 증정권은 <em>황성은</em> 귀하의<br>
      생신을 기하여 <em>배기산</em>이<br>
      진심을 담아 봉정하는<br>
      현금 상당의 증표이옵니다.
    </div>

    <div class="from-section">
      <div class="from-label">증 정 인</div>
      <div class="from-name">Bae Kisan</div>
    </div>

    <div class="barcode-area">
      <div class="barcode" id="bc"></div>
      <div class="barcode-num">HBD · 2026 · 0624</div>
    </div>
  </div>
</div>

<script>
  const bc = document.getElementById('bc');
  const heights = [20,14,20,10,18,12,20,8,16,20,10,18,14,20,8,16,12,20,10,18,20,14,8,20,16,12,18,20,10,16];
  heights.forEach(h => {
    const s = document.createElement('span');
    s.style.height = h + 'px';
    bc.appendChild(s);
  });
</script>
</body>
</html>
